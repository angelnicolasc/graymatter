name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }} / go${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.23"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test core library with coverage
        shell: bash
        run: go test -race -count=1 -timeout=120s -coverprofile=coverage-core.out -covermode=atomic ./pkg/memory/...

      - name: Test CLI module with coverage
        working-directory: cmd/graymatter
        shell: bash
        run: go test -race -count=1 -timeout=300s -coverprofile=../../coverage-cli.out -covermode=atomic ./internal/harness/... ./internal/kg/... ./internal/server/... ./internal/plugin/... ./internal/mcp/... ./internal/daemon/...

      - name: Coverage gate — core library (≥70%)
        shell: bash
        run: |
          TOTAL=$(go tool cover -func=coverage-core.out \
            | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Core coverage: ${TOTAL}%"
          if awk "BEGIN{exit !($TOTAL < 70)}"; then
            echo "::error::Core coverage ${TOTAL}% is below the 70% threshold."
            exit 1
          fi

      - name: Coverage gate — CLI module (≥65%)
        shell: bash
        run: |
          TOTAL=$(go tool cover -func=coverage-cli.out \
            | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "CLI coverage: ${TOTAL}%"
          if awk "BEGIN{exit !($TOTAL < 65)}"; then
            echo "::error::CLI coverage ${TOTAL}% is below the 65% threshold."
            exit 1
          fi

      - name: Upload coverage reports
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-core.out
            coverage-cli.out
          retention-days: 14

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/graymatter

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:CGO_ENABLED = "0"
          go build -ldflags="-s -w" -o NUL ./cmd/graymatter

  bench:
    name: Benchmarks (non-blocking)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run benchmarks (core)
        shell: bash
        run: go test -bench=. -benchmem -benchtime=3s -run='^$' ./pkg/memory/...
        continue-on-error: true
